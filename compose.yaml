# Content Studio — full-stack Docker Compose
#
# Quick start:
#   ./deploy                          # interactive setup
#
# Manual usage:
#   docker compose --env-file .env.deploy up --build
#
# Defaults to localhost if HOST_IP is not set.
# Services exposed:
#   - Web app:       http://<HOST_IP>:<WEB_PORT>
#   - API server:    http://<HOST_IP>:<SERVER_PORT>
#   - MinIO S3 API:  http://<HOST_IP>:<MINIO_API_PORT>
#   - MinIO Console: http://<HOST_IP>:<MINIO_UI_PORT>
# Internal services:
#   - Worker:        background job processor
#   - Redis:         SSE/event pub-sub
#
# Security notes:
#   - All services drop Linux capabilities and block privilege escalation.
#   - Backend services (db, redis, minio, worker) are on an internal network
#     with no direct external access.
#   - DB and Redis ports are exposed for local development convenience only.
#     In production, remove or firewall these port mappings.

services:
  # ------------------------------------------------------------------ #
  # Web App
  # ------------------------------------------------------------------ #
  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    ports:
      - "${WEB_PORT:-8086}:8080"
    environment:
      PUBLIC_SERVER_URL: "http://${HOST_IP:-localhost}:${SERVER_PORT:-3036}"
      PUBLIC_SERVER_API_PATH: /api
      PUBLIC_AUTH_MODE: "${AUTH_MODE:-dev-password}"
    # Note: read_only is not set because the entrypoint writes /app/dist/env.js
    # at startup to inject runtime PUBLIC_* env vars into the SPA bundle.
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      test:
        [
          "CMD-SHELL",
          "wget --quiet --spider http://127.0.0.1:8080/healthcheck",
        ]
    depends_on:
      server:
        condition: service_healthy
    networks: [frontend]

  # ------------------------------------------------------------------ #
  # API Server
  # ------------------------------------------------------------------ #
  server:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    ports:
      - "${SERVER_PORT:-3036}:3036"
    environment:
      NODE_ENV: production
      SERVER_AUTH_SECRET: "${SERVER_AUTH_SECRET:-please_change_this_in_production}"
      AUTH_MODE: "${AUTH_MODE:-dev-password}"
      AUTH_MICROSOFT_CLIENT_ID: "${AUTH_MICROSOFT_CLIENT_ID:-}"
      AUTH_MICROSOFT_CLIENT_SECRET: "${AUTH_MICROSOFT_CLIENT_SECRET:-}"
      AUTH_MICROSOFT_TENANT_ID: "${AUTH_MICROSOFT_TENANT_ID:-}"
      AUTH_ROLE_ADMIN_GROUP_IDS: "${AUTH_ROLE_ADMIN_GROUP_IDS:-}"
      AUTH_ROLE_USER_GROUP_IDS: "${AUTH_ROLE_USER_GROUP_IDS:-}"
      SERVER_POSTGRES_URL: "postgres://postgres:postgres@db:5432/content_studio"
      SERVER_REDIS_URL: "redis://redis:6379"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "3036"
      PUBLIC_WEB_URL: "http://${HOST_IP:-localhost}:${WEB_PORT:-8086}"
      PUBLIC_SERVER_URL: "http://${HOST_IP:-localhost}:${SERVER_PORT:-3036}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      USE_MOCK_AI: "${USE_MOCK_AI:-true}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      # S3 / MinIO storage
      STORAGE_PROVIDER: s3
      S3_BUCKET: content-studio
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: "http://minio:9001"
      S3_PUBLIC_ENDPOINT: "http://${HOST_IP:-localhost}:${MINIO_API_PORT:-9001}"
      # Telemetry
      TELEMETRY_ENABLED: "${TELEMETRY_ENABLED:-false}"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS:-}"
      OTEL_SERVICE_NAME: content-studio-server
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      test:
        [
          "CMD-SHELL",
          "wget --quiet --spider http://0.0.0.0:3036/healthcheck || exit 1",
        ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks: [frontend, backend]

  # ------------------------------------------------------------------ #
  # Worker (background jobs)
  # ------------------------------------------------------------------ #
  worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    environment:
      NODE_ENV: production
      SERVER_POSTGRES_URL: "postgres://postgres:postgres@db:5432/content_studio"
      SERVER_REDIS_URL: "redis://redis:6379"
      PUBLIC_SERVER_URL: "http://${HOST_IP:-localhost}:${SERVER_PORT:-3036}"
      USE_MOCK_AI: "${USE_MOCK_AI:-true}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      # S3 / MinIO storage
      STORAGE_PROVIDER: s3
      S3_BUCKET: content-studio
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: "http://minio:9001"
      S3_PUBLIC_ENDPOINT: "http://${HOST_IP:-localhost}:${MINIO_API_PORT:-9001}"
      # Telemetry
      TELEMETRY_ENABLED: "${TELEMETRY_ENABLED:-false}"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS:-}"
      OTEL_SERVICE_NAME: content-studio-worker
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    read_only: true
    tmpfs: [/tmp]
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks: [backend]

  # ------------------------------------------------------------------ #
  # PostgreSQL
  # Dev-only: port is exposed for local tooling (Drizzle Studio, psql).
  # In production, remove the ports mapping or firewall it.
  # ------------------------------------------------------------------ #
  db:
    restart: unless-stopped
    image: ${DOCKER_REGISTRY:-docker.io}/postgres:16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, FOWNER, DAC_OVERRIDE]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 5
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_studio"]
    networks: [backend]

  # ------------------------------------------------------------------ #
  # Redis (SSE pub/sub)
  # Dev-only: port is exposed for local debugging (redis-cli).
  # In production, remove the ports mapping or firewall it.
  # ------------------------------------------------------------------ #
  redis:
    restart: unless-stopped
    image: ${DOCKER_REGISTRY:-docker.io}/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  # ------------------------------------------------------------------ #
  # Database migrations
  # ------------------------------------------------------------------ #
  migrate:
    restart: "no"
    build:
      context: .
      dockerfile: ./packages/db/Dockerfile
    environment:
      DB_POSTGRES_URL: "postgres://postgres:postgres@db:5432/content_studio"
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      db:
        condition: service_healthy
    networks: [backend]

  # ------------------------------------------------------------------ #
  # MinIO (S3-compatible storage)
  # ------------------------------------------------------------------ #
  minio:
    restart: unless-stopped
    image: ${DOCKER_REGISTRY:-docker.io}/minio/minio:latest
    ports:
      - "${MINIO_API_PORT:-9001}:9001"
      - "${MINIO_UI_PORT:-9090}:9090"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --address ":9001" --console-address ":9090"
    volumes:
      - minio_data:/data
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, FOWNER, DAC_OVERRIDE]
    security_opt: [no-new-privileges:true]
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9001/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  # ------------------------------------------------------------------ #
  # MinIO init — create bucket
  # NOTE: anonymous=public is required because packages/storage uses
  # unauthenticated fetch() for S3 operations. Switching to
  # authenticated access requires adding the AWS SDK or Sigv4 signing
  # to the S3 storage provider — tracked as a separate improvement.
  # ------------------------------------------------------------------ #
  minio-init:
    image: ${DOCKER_REGISTRY:-docker.io}/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set myminio http://minio:9001 minioadmin minioadmin
        mc mb --ignore-existing myminio/content-studio
        mc anonymous set public myminio/content-studio
        echo "MinIO bucket 'content-studio' ready"
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks: [backend]

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  minio_data:
  redis_data:
