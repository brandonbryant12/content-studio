# Content Studio — full-stack Docker Compose
#
# Quick start:
#   ./deploy                          # interactive setup
#
# Manual usage:
#   docker compose --env-file .env.deploy up --build
#
# Defaults to localhost if HOST_IP is not set.
# Public URLs can differ from the bind ports when you place nginx/ingress in
# front of the stack (for example, https://studio.example.com -> 127.0.0.1:8086
# and /api -> 127.0.0.1:3036).
# Default direct exposure:
#   - Web app:       http://<HOST_IP>:<WEB_PORT>
#   - API server:    http://<HOST_IP>:<SERVER_PORT>
#   - MinIO S3 API:  http://<HOST_IP>:<MINIO_API_PORT>
#   - MinIO Console: http://<HOST_IP>:<MINIO_UI_PORT>
# Internal services:
#   - Worker:        background job processor
#   - Redis:         SSE/event pub-sub
#
# Security notes:
#   - DB and Redis ports are exposed for local development convenience only.
#   - In production, remove or firewall these port mappings.

name: ${COMPOSE_PROJECT_NAME:-content-studio}

services:
  # ------------------------------------------------------------------ #
  # Web App
  # ------------------------------------------------------------------ #
  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        PUBLIC_SERVER_URL: "http://placeholder.invalid"
        PUBLIC_SERVER_API_PATH: "/api"
        PUBLIC_AUTH_MODE: "dev-password"
        PUBLIC_WEB_URL: "http://placeholder.invalid"
        PUBLIC_BASE_PATH: "/"
    ports:
      # Set WEB_BIND_IP=127.0.0.1 when nginx/reverse proxy is the only ingress.
      - "${WEB_BIND_IP:-0.0.0.0}:${WEB_PORT:-8086}:8080"
    environment:
      PUBLIC_SERVER_URL: "${PUBLIC_SERVER_URL:-http://${HOST_IP:-localhost}:${SERVER_PORT:-3036}}"
      PUBLIC_SERVER_API_PATH: /api
      PUBLIC_AUTH_MODE: "${AUTH_MODE:-dev-password}"
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 3
      test:
        [
          "CMD-SHELL",
          "wget --quiet --spider http://127.0.0.1:8080/healthcheck",
        ]
    depends_on:
      server:
        condition: service_healthy
    networks: [frontend]

  # ------------------------------------------------------------------ #
  # API Server
  # ------------------------------------------------------------------ #
  server:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    ports:
      # Set SERVER_BIND_IP=127.0.0.1 when nginx/reverse proxy is the only ingress.
      - "${SERVER_BIND_IP:-0.0.0.0}:${SERVER_PORT:-3036}:3036"
    environment:
      NODE_ENV: "${DEPLOY_NODE_ENV:-development}"
      SERVER_AUTH_SECRET: "${SERVER_AUTH_SECRET:-please_change_this_in_production}"
      AUTH_MODE: "${AUTH_MODE:-dev-password}"
      AUTH_MICROSOFT_CLIENT_ID: "${AUTH_MICROSOFT_CLIENT_ID:-}"
      AUTH_MICROSOFT_CLIENT_SECRET: "${AUTH_MICROSOFT_CLIENT_SECRET:-}"
      AUTH_MICROSOFT_TENANT_ID: "${AUTH_MICROSOFT_TENANT_ID:-}"
      AUTH_ROLE_ADMIN_GROUP_IDS: "${AUTH_ROLE_ADMIN_GROUP_IDS:-}"
      AUTH_ROLE_USER_GROUP_IDS: "${AUTH_ROLE_USER_GROUP_IDS:-}"
      SERVER_POSTGRES_URL: "postgres://postgres:postgres@db:5432/content_studio"
      SERVER_RUN_DB_MIGRATIONS_ON_STARTUP: "true"
      SERVER_REDIS_URL: "redis://redis:6379"
      TRUST_PROXY: "${TRUST_PROXY:-false}"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "3036"
      PUBLIC_WEB_URL: "${PUBLIC_WEB_URL:-http://${HOST_IP:-localhost}:${WEB_PORT:-8086}}"
      PUBLIC_SERVER_URL: "${PUBLIC_SERVER_URL:-http://${HOST_IP:-localhost}:${SERVER_PORT:-3036}}"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      USE_MOCK_AI: "${USE_MOCK_AI:-true}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      # S3 / MinIO storage
      S3_BUCKET: content-studio
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: "http://minio:9001"
      S3_PUBLIC_ENDPOINT: "http://${HOST_IP:-localhost}:${MINIO_API_PORT:-9001}"
      # Telemetry
      TELEMETRY_ENABLED: "${TELEMETRY_ENABLED:-false}"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS:-}"
      OTEL_SERVICE_NAME: content-studio-server
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-}"
      NODE_EXTRA_CA_CERTS: "${NODE_EXTRA_CA_CERTS:-}"
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      test:
        [
          "CMD-SHELL",
          "wget --quiet --spider http://127.0.0.1:3036/healthcheck || exit 1",
        ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [frontend, backend]

  # ------------------------------------------------------------------ #
  # Worker (background jobs)
  # ------------------------------------------------------------------ #
  worker:
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    environment:
      NODE_ENV: "${DEPLOY_NODE_ENV:-development}"
      SERVER_POSTGRES_URL: "postgres://postgres:postgres@db:5432/content_studio"
      SERVER_REDIS_URL: "redis://redis:6379"
      PUBLIC_SERVER_URL: "${PUBLIC_SERVER_URL:-http://${HOST_IP:-localhost}:${SERVER_PORT:-3036}}"
      USE_MOCK_AI: "${USE_MOCK_AI:-true}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      # S3 / MinIO storage
      S3_BUCKET: content-studio
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: "http://minio:9001"
      S3_PUBLIC_ENDPOINT: "http://${HOST_IP:-localhost}:${MINIO_API_PORT:-9001}"
      # Telemetry
      TELEMETRY_ENABLED: "${TELEMETRY_ENABLED:-false}"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}"
      OTEL_EXPORTER_OTLP_HEADERS: "${OTEL_EXPORTER_OTLP_HEADERS:-}"
      OTEL_SERVICE_NAME: content-studio-worker
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-}"
      NODE_EXTRA_CA_CERTS: "${NODE_EXTRA_CA_CERTS:-}"
    depends_on:
      server:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [backend]

  # ------------------------------------------------------------------ #
  # PostgreSQL
  # Dev-only: port is exposed for local tooling (Drizzle Studio, psql).
  # In production, remove the ports mapping or firewall it.
  # ------------------------------------------------------------------ #
  db:
    restart: unless-stopped
    image: ${DOCKER_REGISTRY:-docker.io}/postgres:16
    ports:
      # Set POSTGRES_BIND_IP=0.0.0.0 to expose PostgreSQL outside the host.
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: content_studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      interval: 5s
      timeout: 5s
      retries: 5
      test: ["CMD-SHELL", "pg_isready -U postgres -d content_studio"]
    networks: [backend, frontend]

  # ------------------------------------------------------------------ #
  # Redis (SSE pub/sub)
  # Dev-only: port is exposed for local debugging (redis-cli).
  # In production, remove the ports mapping or firewall it.
  # ------------------------------------------------------------------ #
  redis:
    restart: unless-stopped
    image: ${DOCKER_REGISTRY:-docker.io}/redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Bind Redis host port explicitly; default exposes on all interfaces.
      # Set REDIS_BIND_IP=0.0.0.0 to expose Redis outside the host.
      - "${REDIS_BIND_IP:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  # ------------------------------------------------------------------ #
  # MinIO (S3-compatible storage)
  # ------------------------------------------------------------------ #
  minio:
    restart: unless-stopped
    image: ${DOCKER_REGISTRY:-docker.io}/minio/minio:latest
    ports:
      # Bind to localhost by default. Set MINIO_*_BIND_IP=0.0.0.0 to expose externally.
      - "${MINIO_API_BIND_IP:-127.0.0.1}:${MINIO_API_PORT:-9001}:9001"
      - "${MINIO_UI_BIND_IP:-127.0.0.1}:${MINIO_UI_PORT:-9090}:9090"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --address ":9001" --console-address ":9090"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9001/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [backend]

  # ------------------------------------------------------------------ #
  # MinIO init — create private bucket
  # S3 operations are authenticated by the storage provider (SigV4/AWS SDK).
  # ------------------------------------------------------------------ #
  minio-init:
    image: ${DOCKER_REGISTRY:-docker.io}/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set myminio http://minio:9001 minioadmin minioadmin
        mc mb --ignore-existing myminio/content-studio
        mc anonymous set none myminio/content-studio
        echo "MinIO bucket 'content-studio' ready"
    networks: [backend]

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
