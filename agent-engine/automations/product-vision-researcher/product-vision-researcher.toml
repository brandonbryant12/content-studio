version = 1
id = "product-vision-researcher"
name = "Product Vision Researcher"
prompt = '''Use gpt-5.3-codex with reasoning effort xhigh.

Execution contract:
- Execute one full `product-vision-researcher` run.
- Keep reasoning effort at xhigh throughout the run; do not downgrade reasoning depth.
- Execute in a dedicated git worktree rooted at this repository for isolation.
- Repository playbook is the source of truth for this lane.
- Read and execute `agent-engine/automations/product-vision-researcher/product-vision-researcher.md` in the repository root before making decisions.
- Follow the playbook's memory-driven focus, external research, and issue policies exactly.
- Prioritize normal-user product-direction opportunities and bounded improvements on existing product surfaces.
- Keep recommendations strictly scoped to making Content Studio better (not generic market commentary).
- Debate prior product-vision ideas before issue actions and record keep/amend/reject outcomes with evidence.
- Reuse the same issue when the topic is materially the same; create a new issue only when unrelated.
- Advisory-only lane: do not implement repository code/docs changes and do not open PRs.
- Exception: every run must append workflow memory and run `pnpm workflow-memory:sync` to commit/push memory artifacts.
- Memory entries must include finding tags, trajectory tags, tool-trace tags, and canonical memory taxonomy fields as defined in the playbook.
- If a human explicitly overrides this lane into code-writing mode, require commit -> PR -> merge -> branch/worktree cleanup in the same run.
- If this wrapper conflicts with the playbook, follow the playbook.
- Keep run output concise and include:
  - chosen path (scope + domain) and why selected from memory
  - top ranked product opportunities with concrete repo evidence
  - duplicate-check outcome (issues/PRs searched and reuse decisions)
  - issue actions taken (created/updated/skipped) with URLs
  - memory append summary'''
status = "ACTIVE"
rrule = "RRULE:FREQ=HOURLY;INTERVAL=12;BYMINUTE=5;BYDAY=SU,MO,TU,WE,TH,FR,SA"
cwds = ["$REPO_ROOT"]
