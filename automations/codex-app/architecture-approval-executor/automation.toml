version = 1
id = "architecture-approval-executor"
name = "Architecture Approval Executor"
prompt = '''Use gpt-5.3-codex with reasoning effort xhigh. Role: human-in-the-loop implementation lane for coding-pattern issues.

Scope and approval:
- Triage open GitHub issues labeled architecture-radar in brandonbryant12/content-studio.
- Treat approval signals on issue comments as either:
  1) a +1 reaction, or
  2) a human comment body that is exactly +1, :+1:, or thumbs up.
- Optional guidance comments on non-approved issues are allowed and do not consume execution capacity.
- Select exactly one actionable approved issue per run.
- Deterministic priority: highest approval-signal count, then oldest issue number.
- Skip issues already linked to an open PR or recently processed in memory.

Runtime preflight for code tasks:
1) GitHub access: `gh auth status`.
2) Node runtime: `node -v` and require >= 22.10.0. If lower, prepend PATH with `$HOME/.nvm/versions/node/v24.13.1/bin:/opt/homebrew/opt/node@22/bin:$PATH` and re-check.
3) Workspace bootstrap: `pnpm install --frozen-lockfile`; if dependency-state corruption is detected, remove node_modules once and retry.
4) Container runtime: `docker info` must pass.
5) Testcontainers DB setup: run `pnpm test:db:setup` and stop if it fails.

Branching and implementation contract:
- Branch from latest main every run:
  - `git fetch origin main`
  - `git checkout -B codex/architecture-issue-<issue-number>-<yyyymmddhhmm> origin/main`
- Implement only the selected issue in /Users/brandon/Development/content-studio.
- Read relevant docs in docs/ before edits and follow AGENTS.md guardrails.
- If the selected issue contains a Research Trace or external paper links, append a log entry to `research/implemented-ideas.md` with:
  - date
  - issue and PR links
  - paper link(s)
  - idea(s) adopted
  - what was implemented in this repo

Validation gates (required, in order):
- `pnpm typecheck`
- `pnpm lint`
- `pnpm test:invariants`
- `pnpm test`
- `pnpm build`
- `pnpm test:e2e`

Delivery behavior:
- If any gate fails, do not open/merge PR. Post concise failure details and next action on the issue, then record memory.
- If all gates pass, commit with a conventional message referencing the issue, push, open PR to main with `Fixes #<issue-number>`, add labels codex and codex-automation when available, include a Research Log Update section when applicable, and auto-merge with squash.
- After merge, verify issue closure. If not closed, post corrective issue comment and open a follow-up issue for linkage failure.

Append run details to memory.md and inbox summary including selected issue, branch, PR URL, merge result, and closure verification. Hard limit: one implementation issue per run.'''
status = "ACTIVE"
rrule = "RRULE:FREQ=HOURLY;INTERVAL=1;BYMINUTE=11;BYDAY=SU,MO,TU,WE,TH,FR,SA"
