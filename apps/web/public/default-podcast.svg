<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="hsl(238, 70%, 65%)" />
      <stop offset="100%" stop-color="hsl(238, 70%, 50%)" />
    </linearGradient>

    <pattern id="wave-pattern" width="60" height="60" patternUnits="userSpaceOnUse">
       <path d="M 30 0 L 30 60" stroke="white" stroke-opacity="0.03" stroke-width="20" stroke-linecap="round"/>
    </pattern>
  </defs>

  <rect width="600" height="400" fill="url(#brand-gradient)" />
  <rect width="600" height="400" fill="url(#wave-pattern)" />

  <g transform="translate(252, 152)">
    <rect width="96" height="96" rx="24" fill="white" fill-opacity="0.15" />
    <g stroke="white" stroke-width="8" stroke-linecap="round">
      <line x1="24" y1="48" x2="24" y2="48" />
      <line x1="36" y1="36" x2="36" y2="60" />
      <line x1="48" y1="27" x2="48" y2="69" />
      <line x1="60" y1="36" x2="60" y2="60" />
      <line x1="72" y1="48" x2="72" y2="48" />
    </g>
  </g>
</svg>
